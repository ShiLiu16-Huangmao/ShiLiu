<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上传照片 · 猫咪相册</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* --- 上传页专用样式 --- */
    .upload-page {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 16px 48px;
    }

    .upload-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 24px 0 20px;
    }

    .upload-back {
      width: 36px;
      height: 36px;
      border: none;
      background: #f5f5f7;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: var(--color-text);
      flex-shrink: 0;
    }

    .upload-title {
      font-size: 1.3rem;
      font-weight: 700;
    }

    /* 文件选择区 */
    .drop-zone {
      border: 2px dashed var(--color-border);
      border-radius: var(--radius);
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .drop-zone:active,
    .drop-zone.dragover {
      border-color: #0071e3;
      background: #f5f9ff;
    }

    .drop-zone-icon {
      font-size: 2.5rem;
      display: block;
      margin-bottom: 8px;
    }

    .drop-zone-text {
      font-size: 1rem;
      color: var(--color-text);
      font-weight: 500;
    }

    .drop-zone-hint {
      margin-top: 6px;
      font-size: 0.85rem;
      color: var(--color-text-tertiary);
    }

    .drop-zone input[type="file"] {
      display: none;
    }

    /* 预览区 */
    .preview-list {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .preview-item {
      display: flex;
      gap: 12px;
      background: #f5f5f7;
      border-radius: var(--radius);
      padding: 12px;
      align-items: center;
    }

    .preview-thumb {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      background: #e5e5e7;
    }

    .preview-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .preview-field {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .preview-field label {
      font-size: 0.75rem;
      color: var(--color-text-tertiary);
      font-weight: 500;
    }

    .preview-field input {
      width: 100%;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.9rem;
      font-family: var(--font-stack);
      background: #fff;
      color: var(--color-text);
      outline: none;
      transition: border-color 0.2s;
    }

    .preview-field input:focus {
      border-color: #0071e3;
    }

    .preview-remove {
      width: 32px;
      height: 32px;
      border: none;
      background: none;
      font-size: 1.2rem;
      color: var(--color-text-tertiary);
      cursor: pointer;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .preview-remove:active {
      background: rgba(0,0,0,0.08);
      color: #ff3b30;
    }

    /* 上传按钮 */
    .upload-actions {
      margin-top: 24px;
    }

    .btn-upload {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #0071e3;
      color: #fff;
      font-size: 1.05rem;
      font-weight: 600;
      font-family: var(--font-stack);
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-upload:active {
      background: #005bb5;
    }

    .btn-upload:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* 进度条 */
    .progress-wrap {
      margin-top: 16px;
      display: none;
    }

    .progress-wrap.active {
      display: block;
    }

    .progress-bar {
      height: 6px;
      border-radius: 3px;
      background: #e5e5e7;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #0071e3;
      border-radius: 3px;
      width: 0%;
      transition: width 0.3s ease;
    }

    .progress-text {
      margin-top: 8px;
      font-size: 0.85rem;
      color: var(--color-text-secondary);
      text-align: center;
    }

    /* 消息提示 */
    .toast {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 500;
      z-index: 2000;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      max-width: 90vw;
      text-align: center;
    }

    .toast.show {
      opacity: 1;
    }

    .toast-success {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .toast-error {
      background: #fce4ec;
      color: #c62828;
    }

    /* 成功页 */
    .result-card {
      margin-top: 24px;
      background: #f5f5f7;
      border-radius: var(--radius);
      padding: 32px 24px;
      text-align: center;
    }

    .result-icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 12px;
    }

    .result-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--color-text);
    }

    .result-desc {
      margin-top: 6px;
      font-size: 0.95rem;
      color: var(--color-text-secondary);
    }

    .result-link {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 24px;
      border-radius: 8px;
      background: #0071e3;
      color: #fff;
      text-decoration: none;
      font-weight: 500;
    }

    /* 提示卡片 */
    .notice-card {
      margin-top: 32px;
      padding: 16px;
      background: #fffbf0;
      border: 1px solid #f5e6c8;
      border-radius: 10px;
      font-size: 0.85rem;
      color: #8b6914;
      line-height: 1.6;
    }

    .notice-card strong {
      display: block;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>

<header class="site-header">
  <h1 class="site-title">🐱 猫咪相册</h1>
  <p class="site-desc">上传新的猫咪照片</p>
</header>

<main class="upload-page" id="uploadPage">
  <!-- 文件拖放区 -->
  <div class="drop-zone" id="dropZone">
    <span class="drop-zone-icon">📸</span>
    <p class="drop-zone-text">点击选择照片 或 拖放到这里</p>
    <p class="drop-zone-hint">支持 JPG / PNG / WebP · 可多选</p>
    <input type="file" id="fileInput" accept="image/*" multiple>
  </div>

  <!-- 预览列表 -->
  <div class="preview-list" id="previewList"></div>

  <!-- 上传按钮 -->
  <div class="upload-actions" id="uploadActions" style="display:none">
    <button class="btn-upload" id="btnUpload">上传到相册</button>
  </div>

  <!-- 进度条 -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <p class="progress-text" id="progressText">准备中…</p>
  </div>

  <!-- 成功结果 -->
  <div class="result-card" id="resultCard" style="display:none">
    <span class="result-icon">✅</span>
    <p class="result-title">上传完成！</p>
    <p class="result-desc" id="resultDesc"></p>
    <a class="result-link" href="index.html">返回相册</a>
  </div>

  <!-- 配置提示 -->
  <div class="notice-card" id="noticeCard">
    <strong>⚙️ 使用前请配置：</strong>
    1. 复制 <code>config.example.js</code> 为 <code>config.js</code><br>
    2. 填入你的 GitHub Token（需要 repo 权限）<br>
    3. 修改 <code>owner</code> 和 <code>repo</code> 为你的仓库信息
  </div>
</main>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script src="upload.js"></script>
</body>
</html>
